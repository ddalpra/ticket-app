version: "3.8"

networks:
  ticketing-net:
    driver: bridge

services:

  # ── PostgreSQL per Keycloak ─────────────────────────────────────────────────
  postgres-kc:
    image: docker.io/postgres:16-alpine
    container_name: ticketing-postgres-kc
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_secret
    volumes:
      - postgres-kc-data:/var/lib/postgresql/data
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL per l'applicazione ───────────────────────────────────────────
  postgres-app:
    image: docker.io/postgres:16-alpine
    container_name: ticketing-postgres-app
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres-app-data:/var/lib/postgresql/data
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing -d ticketing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: ticketing-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-kc:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secret
      KC_HOSTNAME: 172.127.29.202
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8180
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_IMPORT: /opt/keycloak/data/import/realm-ticket.json
    volumes:
      - ./keycloak:/opt/keycloak/data/import:Z
    ports:
      - "8180:8180"
    networks:
      - ticketing-net
    depends_on:
      postgres-kc:
        condition: service_healthy

  # ── KrakenD API Gateway ─────────────────────────────────────────────────────
  krakend:
    image: docker.io/devopsfaith/krakend:2.6
    container_name: ticketing-krakend
    restart: unless-stopped
    volumes:
      - ./krakend:/etc/krakend:Z
    ports:
      - "8080:8080"
    networks:
      - ticketing-net
    depends_on:
      keycloak
    command: ["run", "-c", "/etc/krakend/krakend.json"]

volumes:
  postgres-kc-data:
  postgres-app-data:
